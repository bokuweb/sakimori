name: "sakimori"
description: "eBPF/ETW audit & block for GitHub Actions (Linux + Windows)"
author: "bokuweb"
branding:
  icon: "shield"
  color: "red"

inputs:
  policy:
    description: "Path to the policy file (YAML or JSON)."
    required: false
    default: ".github/sakimori.yml"
  mode:
    description: "audit | block. Overrides `mode:` in the policy file."
    required: false
    default: "audit"
  version:
    description: "Sakimori release tag to install (e.g. v0.6.0). Defaults to whatever tag this action was referenced as; `latest` resolves the newest release."
    required: false
    default: ""
  log:
    description: "Where the subsequent `sakimori run` step should write its JSON audit log."
    required: false
    default: "sakimori.log.json"
  run:
    description: |
      Optional shell script to supervise. If set, the action installs sakimori
      AND runs the script under `sakimori run` automatically — no separate
      step needed. On Linux the script is executed with
      `sudo -E env "PATH=$PATH" "$SAKIMORI_BIN" run … -- bash -euxo pipefail -c '<run>'`;
      on Windows with `& $env:SAKIMORI_BIN run … -- pwsh -NoProfile -Command "<run>"`.
      Leave empty (default) to keep the install-only behaviour and write the
      `sakimori run` invocation yourself in a later step.
    required: false
    default: ""
  html:
    description: "Path to write the HTML report to (passed as `--html`). Only used when `run` is set."
    required: false
    default: "sakimori-report.html"
  summary:
    description: "Path the supervised run should append its step-summary markdown to (passed as `--summary`). Defaults to $GITHUB_STEP_SUMMARY. Only used when `run` is set."
    required: false
    default: ""
  snapshot-workspace:
    description: "If set, passed as `--snapshot-workspace <path>` to take a workspace tamper-detection baseline before and after the supervised command. Only used when `run` is set."
    required: false
    default: ""

outputs:
  bin:
    description: "Absolute path to the installed sakimori binary."
    value: ${{ steps.linux.outputs.bin || steps.windows.outputs.bin }}
  bpf:
    description: "Absolute path to the installed sakimori.bpf.o (Linux only)."
    value: ${{ steps.linux.outputs.bpf }}

runs:
  using: composite
  steps:
    # --------------- Linux ---------------
    - id: linux
      if: runner.os == 'Linux'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        version="${INPUT_VERSION}"
        if [[ -z "${version}" ]]; then
          version="${GITHUB_ACTION_REF:-}"
        fi
        if [[ -z "${version}" || "${version}" == "main" || "${version}" == "latest" ]]; then
          version=$(gh release view --repo bokuweb/sakimori --json tagName -q .tagName)
        elif [[ "${version}" =~ ^v[0-9]+$ ]]; then
          # "v0", "v1", ... moving tags don't have matching Release
          # objects (release.yml's moving-tag job only force-pushes
          # the git ref). Walk the release list and pick the newest
          # entry whose tag starts with "v<MAJOR>." — this is what
          # users mean when they pin to @v<MAJOR>.
          major="${version#v}"
          version=$(gh api "repos/bokuweb/sakimori/releases" \
            --jq "[.[] | select(.tag_name | startswith(\"v${major}.\")) | .tag_name] | first")
          if [[ -z "${version}" || "${version}" == "null" ]]; then
            echo "::error::no v${major}.* release found on bokuweb/sakimori" >&2
            exit 1
          fi
        fi
        echo "Installing sakimori ${version} for Linux"

        arch=$(uname -m)
        case "${arch}" in
          x86_64)  target="x86_64-unknown-linux-musl" ;;
          aarch64) target="aarch64-unknown-linux-musl" ;;
          *) echo "::error::unsupported Linux arch: ${arch}"; exit 1 ;;
        esac

        asset="sakimori-${target}.tar.gz"
        workdir=$(mktemp -d)
        cd "${workdir}"
        gh release download "${version}" \
          --repo bokuweb/sakimori \
          --pattern "${asset}" \
          --pattern "${asset}.sha256"
        sha256sum -c "${asset}.sha256"
        tar -xzf "${asset}"

        dest="${RUNNER_TEMP}/sakimori"
        mkdir -p "${dest}"
        mv "sakimori-${target}/sakimori" "${dest}/sakimori"
        mv "sakimori-${target}/sakimori.bpf.o" "${dest}/sakimori.bpf.o"
        chmod +x "${dest}/sakimori"

        echo "bin=${dest}/sakimori" >> "${GITHUB_OUTPUT}"
        echo "bpf=${dest}/sakimori.bpf.o" >> "${GITHUB_OUTPUT}"
        echo "SAKIMORI_BPF_OBJ=${dest}/sakimori.bpf.o" >> "${GITHUB_ENV}"
        echo "SAKIMORI_BIN=${dest}/sakimori" >> "${GITHUB_ENV}"
        echo "SAKIMORI_POLICY=${{ inputs.policy }}" >> "${GITHUB_ENV}"
        echo "SAKIMORI_MODE=${{ inputs.mode }}" >> "${GITHUB_ENV}"
        echo "SAKIMORI_LOG=${{ inputs.log }}" >> "${GITHUB_ENV}"
        echo "SAKIMORI_OS=linux" >> "${GITHUB_ENV}"

    # --------------- Windows ---------------
    - id: windows
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        $ErrorActionPreference = "Stop"
        $version = $env:INPUT_VERSION
        if ([string]::IsNullOrEmpty($version)) { $version = $env:GITHUB_ACTION_REF }
        if ([string]::IsNullOrEmpty($version) -or $version -eq "main" -or $version -eq "latest") {
          $version = gh release view --repo bokuweb/sakimori --json tagName -q .tagName
        } elseif ($version -match '^v[0-9]+$') {
          # "v0", "v1", ... moving tags have no matching Release object;
          # resolve to the newest "v<MAJOR>.*" release. Mirrors the
          # Linux branch above.
          $major = $version.Substring(1)
          $version = gh api "repos/bokuweb/sakimori/releases" `
            --jq "[.[] | select(.tag_name | startswith(`"v$major.`")) | .tag_name] | first"
          if ([string]::IsNullOrEmpty($version) -or $version -eq "null") {
            Write-Host "::error::no v$major.* release found on bokuweb/sakimori"
            exit 1
          }
        }
        Write-Host "Installing sakimori $version for Windows"

        $target = "x86_64-pc-windows-msvc"
        $asset = "sakimori-$target.tar.gz"
        $workdir = New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\sakimori-download" | Select-Object -ExpandProperty FullName
        Push-Location $workdir
        gh release download $version --repo bokuweb/sakimori --pattern $asset --pattern "$asset.sha256"

        # Manual checksum verify (sha256sum is not on Windows by default but
        # certutil is — still, a couple lines of pwsh is simpler).
        $expected = ((Get-Content "$asset.sha256") -split '\s+')[0]
        $actual = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
        if ($expected -ne $actual) {
          throw "checksum mismatch for $asset (expected $expected, got $actual)"
        }

        tar -xzf $asset
        Pop-Location

        $dest = "$env:RUNNER_TEMP\sakimori"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Move-Item -Force "$workdir\sakimori-$target\sakimori-win.exe" "$dest\sakimori-win.exe"

        # Expose the same env / output names as Linux so downstream steps
        # can be written once and work on both.
        "bin=$dest\sakimori-win.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "SAKIMORI_BIN=$dest\sakimori-win.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SAKIMORI_POLICY=${{ inputs.policy }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SAKIMORI_MODE=${{ inputs.mode }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SAKIMORI_LOG=${{ inputs.log }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SAKIMORI_OS=windows" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    # --------------- anything else (macOS) ---------------
    - if: runner.os != 'Linux' && runner.os != 'Windows'
      shell: bash
      run: |
        echo "::error::sakimori supports Linux + Windows only (runner=${RUNNER_OS})"
        exit 1

    # --------------- info step (both OSes) ---------------
    - shell: bash
      if: runner.os == 'Linux'
      run: |
        if [[ -f "${SAKIMORI_POLICY}" ]]; then
          "${SAKIMORI_BIN}" check-policy --policy "${SAKIMORI_POLICY}" >/dev/null
          echo "✓ policy validated: ${SAKIMORI_POLICY}"
        else
          echo "::notice::policy file '${SAKIMORI_POLICY}' not found — the next 'sakimori run' step should point --policy somewhere real."
        fi
        echo ""
        if [[ -z "${INPUT_RUN}" ]]; then
          echo "Sakimori (Linux) installed. Wrap the command you want to supervise like:"
          echo "    - run: sudo -E \$SAKIMORI_BIN run --policy <path> --mode \$SAKIMORI_MODE --log \$SAKIMORI_LOG --summary \$GITHUB_STEP_SUMMARY -- <your command>"
          echo ""
          echo "Or, to let this action wrap the command for you, pass it via the 'run:' input."
        fi
      env:
        INPUT_RUN: ${{ inputs.run }}

    - shell: pwsh
      if: runner.os == 'Windows'
      env:
        INPUT_RUN: ${{ inputs.run }}
      run: |
        if ([string]::IsNullOrEmpty($env:INPUT_RUN)) {
          Write-Host "Sakimori (Windows) installed. Wrap the command you want to supervise like:"
          Write-Host "    - run: & `"$env:SAKIMORI_BIN`" --policy <path> --mode $env:SAKIMORI_MODE --log $env:SAKIMORI_LOG --summary $env:GITHUB_STEP_SUMMARY -- <your command>"
          Write-Host ""
          Write-Host "Or, to let this action wrap the command for you, pass it via the 'run:' input."
        }

    # --------------- Optional supervised-run (Linux) ---------------
    # Only fires when the caller set `with: run: |\n  …`. Mirrors the
    # canonical `sudo -E env "PATH=$PATH" "$SAKIMORI_BIN" run …` snippet
    # from the README so callers don't have to copy it by hand.
    - name: sakimori run (Linux)
      if: runner.os == 'Linux' && inputs.run != ''
      shell: bash
      env:
        INPUT_RUN: ${{ inputs.run }}
        INPUT_HTML: ${{ inputs.html }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        INPUT_SNAPSHOT_WORKSPACE: ${{ inputs.snapshot-workspace }}
      run: |
        set -euo pipefail
        args=(
          run
          --policy "${SAKIMORI_POLICY}"
          --mode   "${SAKIMORI_MODE}"
          --log    "${SAKIMORI_LOG}"
        )
        if [[ -n "${INPUT_HTML}" ]]; then
          args+=(--html "${INPUT_HTML}")
        fi
        summary_path="${INPUT_SUMMARY:-${GITHUB_STEP_SUMMARY:-}}"
        if [[ -n "${summary_path}" ]]; then
          args+=(--summary "${summary_path}")
        fi
        if [[ -n "${INPUT_SNAPSHOT_WORKSPACE}" ]]; then
          args+=(--snapshot-workspace "${INPUT_SNAPSHOT_WORKSPACE}")
        fi
        # `sudo -E` preserves env *except* PATH (sudo always resets it
        # to secure_path). Re-inject the runner user's PATH so the
        # supervised child can find pnpm / cargo / rustup-installed
        # toolchains.
        sudo -E env "PATH=$PATH" "${SAKIMORI_BIN}" "${args[@]}" \
          -- bash -euxo pipefail -c "${INPUT_RUN}"

    # --------------- Optional supervised-run (Windows) ---------------
    - name: sakimori run (Windows)
      if: runner.os == 'Windows' && inputs.run != ''
      shell: pwsh
      env:
        INPUT_RUN: ${{ inputs.run }}
        INPUT_HTML: ${{ inputs.html }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        INPUT_SNAPSHOT_WORKSPACE: ${{ inputs.snapshot-workspace }}
      run: |
        $ErrorActionPreference = "Stop"
        $cliArgs = @(
          "--policy", $env:SAKIMORI_POLICY,
          "--log",    $env:SAKIMORI_LOG
        )
        if (-not [string]::IsNullOrEmpty($env:INPUT_HTML)) {
          $cliArgs += @("--html", $env:INPUT_HTML)
        }
        $summaryPath = if ([string]::IsNullOrEmpty($env:INPUT_SUMMARY)) { $env:GITHUB_STEP_SUMMARY } else { $env:INPUT_SUMMARY }
        if (-not [string]::IsNullOrEmpty($summaryPath)) {
          $cliArgs += @("--summary", $summaryPath)
        }
        if (-not [string]::IsNullOrEmpty($env:INPUT_SNAPSHOT_WORKSPACE)) {
          $cliArgs += @("--snapshot-workspace", $env:INPUT_SNAPSHOT_WORKSPACE)
        }
        & $env:SAKIMORI_BIN @cliArgs -- pwsh -NoProfile -Command $env:INPUT_RUN
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
