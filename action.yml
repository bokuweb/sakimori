name: "sakimori"
description: "eBPF/ETW audit & block for GitHub Actions (Linux + Windows)"
author: "bokuweb"
branding:
  icon: "shield"
  color: "red"

inputs:
  policy:
    description: "Path to the policy file (YAML or JSON)."
    required: false
    default: ".github/sakimori.yml"
  mode:
    description: "audit | block. Overrides `mode:` in the policy file."
    required: false
    default: "audit"
  version:
    description: "Sakimori release tag to install (e.g. v0.6.0). Defaults to whatever tag this action was referenced as; `latest` resolves the newest release."
    required: false
    default: ""
  log:
    description: "Where the subsequent `sakimori run` step should write its JSON audit log."
    required: false
    default: "sakimori.log.json"

outputs:
  bin:
    description: "Absolute path to the installed sakimori binary."
    value: ${{ steps.linux.outputs.bin || steps.windows.outputs.bin }}
  bpf:
    description: "Absolute path to the installed sakimori.bpf.o (Linux only)."
    value: ${{ steps.linux.outputs.bpf }}

runs:
  using: composite
  steps:
    # --------------- Linux ---------------
    - id: linux
      if: runner.os == 'Linux'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        version="${INPUT_VERSION}"
        if [[ -z "${version}" ]]; then
          version="${GITHUB_ACTION_REF:-}"
        fi
        if [[ -z "${version}" || "${version}" == "main" || "${version}" == "latest" ]]; then
          version=$(gh release view --repo bokuweb/sakimori --json tagName -q .tagName)
        fi
        echo "Installing sakimori ${version} for Linux"

        arch=$(uname -m)
        case "${arch}" in
          x86_64)  target="x86_64-unknown-linux-musl" ;;
          aarch64) target="aarch64-unknown-linux-musl" ;;
          *) echo "::error::unsupported Linux arch: ${arch}"; exit 1 ;;
        esac

        asset="sakimori-${target}.tar.gz"
        workdir=$(mktemp -d)
        cd "${workdir}"
        gh release download "${version}" \
          --repo bokuweb/sakimori \
          --pattern "${asset}" \
          --pattern "${asset}.sha256"
        sha256sum -c "${asset}.sha256"
        tar -xzf "${asset}"

        dest="${RUNNER_TEMP}/sakimori"
        mkdir -p "${dest}"
        mv "sakimori-${target}/sakimori" "${dest}/sakimori"
        mv "sakimori-${target}/sakimori.bpf.o" "${dest}/sakimori.bpf.o"
        chmod +x "${dest}/sakimori"

        echo "bin=${dest}/sakimori" >> "${GITHUB_OUTPUT}"
        echo "bpf=${dest}/sakimori.bpf.o" >> "${GITHUB_OUTPUT}"
        echo "SAKIMORI_BPF_OBJ=${dest}/sakimori.bpf.o" >> "${GITHUB_ENV}"
        echo "SAKIMORI_BIN=${dest}/sakimori" >> "${GITHUB_ENV}"
        echo "SAKIMORI_POLICY=${{ inputs.policy }}" >> "${GITHUB_ENV}"
        echo "SAKIMORI_MODE=${{ inputs.mode }}" >> "${GITHUB_ENV}"
        echo "SAKIMORI_LOG=${{ inputs.log }}" >> "${GITHUB_ENV}"
        echo "SAKIMORI_OS=linux" >> "${GITHUB_ENV}"

    # --------------- Windows ---------------
    - id: windows
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        $ErrorActionPreference = "Stop"
        $version = $env:INPUT_VERSION
        if ([string]::IsNullOrEmpty($version)) { $version = $env:GITHUB_ACTION_REF }
        if ([string]::IsNullOrEmpty($version) -or $version -eq "main" -or $version -eq "latest") {
          $version = gh release view --repo bokuweb/sakimori --json tagName -q .tagName
        }
        Write-Host "Installing sakimori $version for Windows"

        $target = "x86_64-pc-windows-msvc"
        $asset = "sakimori-$target.tar.gz"
        $workdir = New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\sakimori-download" | Select-Object -ExpandProperty FullName
        Push-Location $workdir
        gh release download $version --repo bokuweb/sakimori --pattern $asset --pattern "$asset.sha256"

        # Manual checksum verify (sha256sum is not on Windows by default but
        # certutil is — still, a couple lines of pwsh is simpler).
        $expected = ((Get-Content "$asset.sha256") -split '\s+')[0]
        $actual = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
        if ($expected -ne $actual) {
          throw "checksum mismatch for $asset (expected $expected, got $actual)"
        }

        tar -xzf $asset
        Pop-Location

        $dest = "$env:RUNNER_TEMP\sakimori"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Move-Item -Force "$workdir\sakimori-$target\sakimori-win.exe" "$dest\sakimori-win.exe"

        # Expose the same env / output names as Linux so downstream steps
        # can be written once and work on both.
        "bin=$dest\sakimori-win.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "SAKIMORI_BIN=$dest\sakimori-win.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SAKIMORI_POLICY=${{ inputs.policy }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SAKIMORI_MODE=${{ inputs.mode }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SAKIMORI_LOG=${{ inputs.log }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SAKIMORI_OS=windows" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    # --------------- anything else (macOS) ---------------
    - if: runner.os != 'Linux' && runner.os != 'Windows'
      shell: bash
      run: |
        echo "::error::sakimori supports Linux + Windows only (runner=${RUNNER_OS})"
        exit 1

    # --------------- info step (both OSes) ---------------
    - shell: bash
      if: runner.os == 'Linux'
      run: |
        if [[ -f "${SAKIMORI_POLICY}" ]]; then
          "${SAKIMORI_BIN}" check-policy --policy "${SAKIMORI_POLICY}" >/dev/null
          echo "✓ policy validated: ${SAKIMORI_POLICY}"
        else
          echo "::notice::policy file '${SAKIMORI_POLICY}' not found — the next 'sakimori run' step should point --policy somewhere real."
        fi
        echo ""
        echo "Sakimori (Linux) installed. Wrap the command you want to supervise like:"
        echo "    - run: sudo -E \$SAKIMORI_BIN run --policy <path> --mode \$SAKIMORI_MODE --log \$SAKIMORI_LOG --summary \$GITHUB_STEP_SUMMARY -- <your command>"

    - shell: pwsh
      if: runner.os == 'Windows'
      run: |
        Write-Host "Sakimori (Windows) installed. Wrap the command you want to supervise like:"
        Write-Host "    - run: & `"$env:SAKIMORI_BIN`" --policy <path> --mode $env:SAKIMORI_MODE --log $env:SAKIMORI_LOG --summary $env:GITHUB_STEP_SUMMARY -- <your command>"
