name: consumer-smoke

# Proves the published release is consumable as `bokuweb/sakimori@v0`.
# Runs after a release is published, on manual dispatch, and on PRs
# (so we exercise the PR-comment sub-action end-to-end).

on:
  workflow_dispatch:
  pull_request:
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: write

jobs:
  use-as-action:
    # The `bokuweb/sakimori@v0` published action still ships the pre-rename
    # `coronarium-*.tar.gz` assets and exports `CORONARIUM_BIN`; on a
    # pull_request run from this branch the workflow references
    # `$SAKIMORI_BIN` and fails. Re-enable on PR after the first release
    # under the new name has been cut.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The exact pattern third-party consumers will write.
      - uses: bokuweb/sakimori@v0
        with:
          mode: audit

      - name: Run supervised command
        run: |
          # Policy is intentionally rich (one deny per kind) so the
          # uploaded report + PR comment artifact show the realistic
          # ALLOW+DENY mix users will see in block mode. Audit mode
          # means nothing is actually blocked.
          #
          # Targets are picked to look good in the `host` column:
          # 1.1.1.1 and 8.8.8.8 have PTR records (`one.one.one.one`
          # and `dns.google`), whereas CDN anycast IPs like
          # 104.20.x.x / 172.66.x.x don't publish PTR at all — so
          # using example.com (which currently resolves to Cloudflare)
          # would just produce a sea of "—" in the host column.
          cat > /tmp/policy.yml <<'EOF'
          mode: audit
          network:
            default: allow
            deny:
              - target: 1.1.1.1
                ports: [443]
              - target: 8.8.8.8
                ports: [443]
          file:
            default: allow
            deny:
              - /etc/shadow
          process:
            deny_exec:
              - /usr/bin/whoami
          EOF
          sudo -E "$SAKIMORI_BIN" run \
            --policy /tmp/policy.yml \
            --log sakimori.log.json \
            --html sakimori-report.html \
            --summary "$GITHUB_STEP_SUMMARY" \
            -- /bin/sh -c '
              echo hello from sakimori;
              /usr/bin/whoami >/dev/null 2>&1 || true;
              cat /etc/shadow >/dev/null 2>&1 || true;
              cat /etc/hostname >/dev/null;
              curl -s -o /dev/null -m 5 https://1.1.1.1 || true;
              curl -s -o /dev/null -m 5 https://8.8.8.8 || true;
            '
          cat sakimori.log.json | head -60
          # Assert each kind has at least one DENY-tagged sample so
          # the PR comment/artifact genuinely demonstrates the full
          # verdict range — regressions here would quietly produce a
          # boring all-ALLOW report for consumers looking at the comment.
          python3 - <<'PY'
          import json, sys
          d = json.load(open("sakimori.log.json"))
          denied = {}
          for s in d.get("samples", []):
              if s.get("denied"):
                  denied[s["kind"]] = denied.get(s["kind"], 0) + 1
          print(f"observed={d['observed']} denied={d['denied']} denied-by-kind={denied}")
          assert d["observed"] > 0
          for k in ("exec", "open", "connect"):
              if denied.get(k, 0) == 0:
                  print(f"::warning::no denied {k} samples — report artifact will be weaker")
          PY
          test -f sakimori-report.html

      # Upload both so the comment's one-liner can pull the HTML.
      - uses: actions/upload-artifact@v4
        with:
          name: sakimori-report
          path: |
            sakimori-report.html
            sakimori.log.json

      # Only meaningful on pull_request events — on release/dispatch this
      # step no-ops (the sub-action bails early).
      - uses: bokuweb/sakimori/comment@v0
        if: github.event_name == 'pull_request'
        with:
          log: sakimori.log.json
          artifact-name: sakimori-report
          html-filename: sakimori-report.html

      - name: Verify PR comment was posted
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          gh api "repos/${GITHUB_REPOSITORY}/issues/${pr}/comments" --paginate \
            --jq '.[] | .body' | grep -q "sakimori-report" \
            || { echo "::error::comment not found on PR"; exit 1; }
          echo "✓ sakimori-report comment is on PR #${pr}"

  block-as-action:
    # Complement the audit-mode happy path with a block-mode run that
    # asserts the published action actually makes CI fail when a deny
    # happens. Runs alongside use-as-action (doesn't need its results).
    # Skipped on PR for the same reason as use-as-action above.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bokuweb/sakimori@v0
        with:
          mode: block
      - name: Block-mode run should fail with a denied connect
        run: |
          cat > /tmp/block.yml <<'EOF'
          mode: block
          network: {}
          EOF
          set +e
          sudo -E "$SAKIMORI_BIN" run \
            --policy /tmp/block.yml \
            --log /tmp/block.log.json \
            -- /bin/sh -c 'curl -sS -o /dev/null -m 5 http://93.184.216.34 2> /tmp/curl.stderr; echo curl_rc=$? > /tmp/child'
          rc=$?
          set -e
          echo "sakimori rc=${rc}"
          cat /tmp/child
          cat /tmp/curl.stderr
          cat /tmp/block.log.json | head -40
          if [ "$rc" = "0" ]; then
            echo "::error::released action did not fail in block mode"
            exit 1
          fi
          grep -q "curl_rc=0" /tmp/child && {
            echo "::error::kernel did not actually deny the connect"
            exit 1
          } || true
          echo "✓ released action fails CI on block + deny, and curl itself was blocked"

  use-as-action-windows:
    # Proves `bokuweb/sakimori@v0` also works on windows-latest, using
    # the same inputs / env contract as the Linux job above. Skipped on
    # PR for the same reason as use-as-action above.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bokuweb/sakimori@v0
        with:
          mode: audit
      - name: Run supervised command (Windows)
        shell: pwsh
        run: |
          $policy = "$env:RUNNER_TEMP\policy.yml"
          @"
          mode: audit
          network:
            default: allow
          file:
            default: allow
          "@ | Out-File -Encoding utf8 $policy
          $log = "$env:RUNNER_TEMP\log.json"
          $html = "$env:RUNNER_TEMP\report.html"
          & $env:SAKIMORI_BIN --policy $policy --log $log --html $html `
            -- powershell -Command "Get-ChildItem C:\Windows | Select -First 3"
          if ($LASTEXITCODE -ne 0) { throw "sakimori-win exit=$LASTEXITCODE" }
          $json = Get-Content $log -Raw | ConvertFrom-Json
          Write-Host "observed=$($json.observed) denied=$($json.denied)"
          if ($json.observed -lt 1) { throw "no events captured" }
          if (-not (Test-Path $html)) { throw "html report missing" }
