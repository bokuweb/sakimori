name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  userspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace --release
      - run: cargo test --workspace

      - name: deps check (should pass — our Cargo.lock is old enough)
        run: |
          # 1h threshold is enough to prove the binary works end-to-end.
          # 1d was too aggressive — our own Cargo.lock legitimately
          # pulls in recently-published transitive deps from time to time
          # (notably `typenum` via aws-lc-rs for the proxy), and that's
          # a user's problem to resolve in their manifest, not a smoke-
          # test failure mode for the tool itself.
          target/release/sakimori deps check --min-age 1h --no-cache Cargo.lock
      - name: deps check (should fail — absurdly high threshold)
        run: |
          set +e
          target/release/sakimori deps check --min-age 3650d --no-cache Cargo.lock >/tmp/deps.txt
          rc=$?
          set -e
          if [ "$rc" = "0" ]; then
            echo "::error::min-age=3650d should have triggered violations"
            head -5 /tmp/deps.txt
            exit 1
          fi
          echo "✓ deps check correctly reported violations (rc=$rc)"
      - name: deps check json shape
        run: |
          target/release/sakimori deps check --min-age 1h --no-cache --format json Cargo.lock \
            | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['violations']==0; assert d['checked']>100; print(f\"ok violations=0 checked={d['checked']}\")"

      - name: deps check — PyPI fixture (requirements.txt)
        run: |
          target/release/sakimori deps check \
            --min-age 1d --no-cache --format json tests/fixtures/requirements.txt \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['violations'] == 0, d
          assert d['checked'] == 2, d
          labels = {p['ecosystem'] for p in d['packages']}
          assert labels == {'pypi'}, labels
          print('ok pypi', d['checked'])
          "
      - name: deps check — NuGet fixture (packages.lock.json)
        run: |
          target/release/sakimori deps check \
            --min-age 1d --no-cache --format json tests/fixtures/packages.lock.json \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['violations'] == 0, d
          assert d['checked'] == 1, d
          labels = {p['ecosystem'] for p in d['packages']}
          assert labels == {'nuget'}, labels
          print('ok nuget', d['checked'])
          "
      - name: deps check — npm fixture (package-lock.json)
        run: |
          target/release/sakimori deps check \
            --min-age 1d --no-cache --format json tests/fixtures/package-lock.json \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['violations'] == 0, d
          assert d['checked'] == 1, d
          labels = {p['ecosystem'] for p in d['packages']}
          assert labels == {'npm'}, labels
          print('ok npm', d['checked'])
          "
      - name: deps check — all 4 ecosystems in one invocation
        run: |
          set +e
          target/release/sakimori deps check --min-age 3650d --no-cache \
            Cargo.lock \
            tests/fixtures/requirements.txt \
            tests/fixtures/packages.lock.json \
            tests/fixtures/package-lock.json \
            > /tmp/mixed.txt
          rc=$?
          set -e
          head -10 /tmp/mixed.txt
          if [ "$rc" = "0" ]; then
            echo "::error::min-age=3650d should have failed across all ecosystems"
            exit 1
          fi
          # Confirm all four ecosystem labels appear among the violations.
          for label in crates pypi nuget npm; do
            grep -q "${label}/" /tmp/mixed.txt || { echo "::error::no ${label} violations surfaced"; exit 1; }
          done
          echo "✓ all 4 ecosystems produced violations at --min-age 3650d"

  proxy-smoke:
    # End-to-end check that the MITM proxy correctly rewrites metadata
    # responses for all 4 ecosystems. Runs against the real public
    # registries with a high `--min-age` so we're guaranteed to find
    # some too-young versions. If this fails you've regressed either
    # the rewriter or the hudsucker wiring.
    runs-on: ubuntu-latest
    needs: userspace
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p sakimori
      - name: Generate CA + start proxy in background
        run: |
          set -euo pipefail
          # First run creates the CA in $XDG_CONFIG_HOME/sakimori.
          export XDG_CONFIG_HOME="$RUNNER_TEMP/xdg"
          mkdir -p "$XDG_CONFIG_HOME"
          echo "XDG_CONFIG_HOME=$XDG_CONFIG_HOME" >>"$GITHUB_ENV"
          # 365d is enough to guarantee hits on all four fixtures we
          # probe below. Very-old packages will see 0 drops and that's
          # fine — the per-ecosystem assertions pick actively-updated
          # ones.
          ./target/release/sakimori proxy start \
              --listen 127.0.0.1:18910 \
              --min-age 365d \
              --install-log "$RUNNER_TEMP/installs.jsonl" \
              > "$RUNNER_TEMP/proxy.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/proxy.pid"
          # Wait for the listener.
          for i in $(seq 1 30); do
            if ss -ltn 2>/dev/null | grep -q ':18910'; then
              echo "proxy up after ${i}00ms"; break
            fi
            sleep 0.1
          done
          ss -ltn | grep -q ':18910' || { echo "::error::proxy never opened the port"; cat "$RUNNER_TEMP/proxy.log"; exit 1; }
          echo "CA=$XDG_CONFIG_HOME/sakimori/ca.pem" >>"$GITHUB_ENV"
      - name: crates.io sparse index — rewrite drops recent versions
        run: |
          set -euo pipefail
          # `serde` is actively maintained, so some versions are
          # definitely <365d old on any given day.
          direct=$(curl -sS https://index.crates.io/se/rd/serde | wc -l)
          via=$(curl -sS --cacert "$CA" -x http://127.0.0.1:18910 \
                https://index.crates.io/se/rd/serde | wc -l)
          echo "crates.io serde: direct=$direct via=$via"
          if [ "$via" -ge "$direct" ]; then
            echo "::error::expected proxy to drop some serde versions; direct=$direct via=$via"
            exit 1
          fi
          if [ "$via" -lt 100 ]; then
            echo "::error::proxy kept implausibly few versions ($via); rewriter likely broke"
            exit 1
          fi
      - name: npm packument — rewrite drops recent versions AND retargets `latest`
        run: |
          set -euo pipefail
          # `react` has very frequent releases.
          curl -sS https://registry.npmjs.org/react > /tmp/react-direct.json
          curl -sS --cacert "$CA" -x http://127.0.0.1:18910 \
              https://registry.npmjs.org/react > /tmp/react-via.json
          python3 - <<'PY'
          import json, sys
          d = json.load(open('/tmp/react-direct.json'))
          v = json.load(open('/tmp/react-via.json'))
          assert len(v['versions']) < len(d['versions']), (len(d['versions']), len(v['versions']))
          # dist-tag must be retargeted to a still-present version.
          assert v['dist-tags']['latest'] in v['versions'], v['dist-tags']['latest']
          print(f"ok react: direct={len(d['versions'])} via={len(v['versions'])} latest={v['dist-tags']['latest']}")
          PY
      - name: pypi JSON API — rewrite drops recent version keys
        run: |
          set -euo pipefail
          curl -sS https://pypi.org/pypi/requests/json > /tmp/requests-direct.json
          curl -sS --cacert "$CA" -x http://127.0.0.1:18910 \
              https://pypi.org/pypi/requests/json > /tmp/requests-via.json
          python3 - <<'PY'
          import json
          d = json.load(open('/tmp/requests-direct.json'))
          v = json.load(open('/tmp/requests-via.json'))
          assert len(v['releases']) <= len(d['releases']), (len(d['releases']), len(v['releases']))
          # The "urls" shortcut must not contain entries younger than the cutoff.
          # We can't easily compute the exact cutoff here, but `urls`
          # should either be empty (the latest release was young) or
          # equal to the direct value (latest was old enough).
          print(f"ok requests: direct={len(d['releases'])} via={len(v['releases'])} urls_via={len(v.get('urls',[]))}")
          PY
      - name: pypi simple JSON (PEP 691) — rewrite drops young files + versions
        run: |
          set -euo pipefail
          # The -H Accept header is what switches PyPI to the JSON shape.
          curl -sS -H 'Accept: application/vnd.pypi.simple.v1+json' \
               https://pypi.org/simple/requests/ > /tmp/requests-simple-direct.json
          curl -sS --cacert "$CA" -x http://127.0.0.1:18910 \
               -H 'Accept: application/vnd.pypi.simple.v1+json' \
               https://pypi.org/simple/requests/ > /tmp/requests-simple-via.json
          python3 - <<'PY'
          import json
          d = json.load(open('/tmp/requests-simple-direct.json'))
          v = json.load(open('/tmp/requests-simple-via.json'))
          assert len(v['files']) <= len(d['files']), (len(d['files']), len(v['files']))
          print(f"ok simple-json: direct={len(d['files'])} via={len(v['files'])} versions_direct={len(d['versions'])} versions_via={len(v['versions'])}")
          PY
      - name: nuget registration — rewrite drops recent leaves
        run: |
          set -euo pipefail
          # Newtonsoft.Json has inline items in its registration index
          # (small package, not paged separately), so a single fetch is
          # enough to prove the rewrite path works.
          curl -sS https://api.nuget.org/v3/registration5-semver1/newtonsoft.json/index.json \
              > /tmp/nj-direct.json
          curl -sS --cacert "$CA" -x http://127.0.0.1:18910 \
              https://api.nuget.org/v3/registration5-semver1/newtonsoft.json/index.json \
              > /tmp/nj-via.json
          python3 - <<'PY'
          import json
          def leaves(doc):
              return sum(len(p.get('items', [])) for p in doc.get('items', []))
          d = leaves(json.load(open('/tmp/nj-direct.json')))
          v = leaves(json.load(open('/tmp/nj-via.json')))
          # Newtonsoft ships occasional recent betas so direct>via is the expected shape,
          # but we allow equality in case no new versions have landed in the last 365d.
          assert v <= d, (d, v)
          assert v > 50, f"suspicious drop ratio: direct={d} via={v}"
          print(f"ok nuget: direct={d} via={v}")
          PY
      - name: pinned tarball fetch — proxy records an InstallEvent
        run: |
          set -euo pipefail
          # Pick a stable, old-enough lodash version so the age filter
          # (--min-age 365d) doesn't deny it.
          curl -fsS --cacert "$CA" -x http://127.0.0.1:18910 \
            -o /dev/null \
            -A 'npm/10.0.0 node/20.0.0 ci/true' \
            https://registry.npmjs.org/lodash/-/lodash-4.17.21.tgz
          test -f "$RUNNER_TEMP/installs.jsonl"
          echo "--- installs.jsonl ---"
          cat "$RUNNER_TEMP/installs.jsonl"
          python3 - <<'PY'
          import json, os, sys
          path = os.path.join(os.environ["RUNNER_TEMP"], "installs.jsonl")
          rows = [json.loads(l) for l in open(path) if l.strip()]
          hits = [r for r in rows
                  if r["ecosystem"] == "npm"
                  and r["name"] == "lodash"
                  and r["version"] == "4.17.21"]
          assert hits, f"no install event recorded for lodash@4.17.21: {rows}"
          # The npm/10.x UA we sent should classify as `persistent`.
          assert hits[0]["execution_mode"] == "persistent", hits[0]
          assert "user_agent" in hits[0]
          print(f"✓ proxy recorded {len(hits)} install event(s) for lodash@4.17.21")
          PY

      - name: advisories scan consumes the proxy-recorded log
        # End-to-end: the log the proxy just wrote must be readable by
        # `advisories scan` and produce a valid JSON report. We don't
        # assert hit count — OSV may or may not list advisories that
        # transitively cover lodash@4.17.21, and `scan` exits non-zero
        # on any hit. The wiring assertion is what matters here.
        run: |
          set -uxo pipefail
          set +e
          ./target/release/sakimori advisories scan \
              --install-log "$RUNNER_TEMP/installs.jsonl" \
              --json > "$RUNNER_TEMP/proxy-scan.json"
          rc=$?
          set -e
          # Accept 0 (no hits) or 1 (hits found); fail anything else.
          if [ "$rc" != "0" ] && [ "$rc" != "1" ]; then
            echo "::error::advisories scan exited unexpectedly (rc=$rc)"
            cat "$RUNNER_TEMP/proxy-scan.json" || true
            exit 1
          fi
          python3 - <<'PY'
          import json, os
          r = json.load(open(os.path.join(os.environ["RUNNER_TEMP"], "proxy-scan.json")))
          assert r["installs_scanned"] >= 1, r
          assert "hits" in r and isinstance(r["hits"], list), r
          print(f"ok: scanned={r['installs_scanned']} hits={len(r['hits'])}")
          PY

      - name: Show proxy log on success
        if: always()
        run: tail -40 "$RUNNER_TEMP/proxy.log" || true
      - name: Upload proxy install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proxy-installs-log
          path: ${{ runner.temp }}/installs.jsonl
      - name: Stop proxy
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/proxy.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/proxy.pid")" 2>/dev/null || true
          fi

  verify-cache-smoke:
    # End-to-end check that `deps verify-cache` actually catches a
    # poisoned cache for every supported ecosystem. The "clean" pass
    # also exercises the `./verify-cache` sub-action (action.yml +
    # main.js) once per ecosystem; the "poisoned" assertion goes
    # through the CLI directly so we can capture the non-zero exit.
    runs-on: ubuntu-latest
    needs: userspace
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p sakimori
      - run: echo "SAKIMORI_BIN=$PWD/target/release/sakimori" >>"$GITHUB_ENV"

      # --- npm ----------------------------------------------------------
      - name: npm — populate cacache via a real install
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/npm-smoke"
          cd "$RUNNER_TEMP/npm-smoke"
          npm init -y >/dev/null
          # is-odd is tiny (one dep on `is-number`) and stable.
          npm install --no-audit --no-fund --silent is-odd@3.0.1
          test -f package-lock.json
          # Confirm cacache actually got populated.
          test -d "$HOME/.npm/_cacache/content-v2"
      - name: npm — verify-cache (action wrapper, clean)
        uses: ./verify-cache
        with:
          lockfile: ${{ runner.temp }}/npm-smoke/package-lock.json
      - name: npm — poison + assert verify-cache fails
        run: |
          set -euo pipefail
          # cacache's `content-v2/` holds both tarball blobs *and*
          # registry packument blobs — a blind `find | head -1` often
          # picks a packument that isn't referenced by the lockfile,
          # so the verifier walks past it and reports clean. Derive
          # the blob path from the lockfile's own `integrity:` so we
          # poison a file we know the verifier will hash.
          integrity=$(python3 -c "
          import json, sys
          d = json.load(open(sys.argv[1]))
          for k, v in d.get('packages', {}).items():
              if k.startswith('node_modules/') and 'integrity' in v:
                  print(v['integrity']); sys.exit(0)
          sys.exit('no integrity entry found')
          " "$RUNNER_TEMP/npm-smoke/package-lock.json")
          algo=${integrity%%-*}
          b64=${integrity#*-}
          hex=$(printf '%s' "$b64" | base64 -d | xxd -p -c 9999)
          aa=${hex:0:2}; bb=${hex:2:2}; rest=${hex:4}
          blob="$HOME/.npm/_cacache/content-v2/$algo/$aa/$bb/$rest"
          test -f "$blob" || { echo "::error::expected cacache blob $blob not found"; ls -la "$(dirname "$blob")" || true; exit 1; }
          echo "poisoning $blob (lockfile-referenced)"
          printf 'X' >>"$blob"
          set +e
          "$SAKIMORI_BIN" deps verify-cache --lockfile "$RUNNER_TEMP/npm-smoke/package-lock.json"
          rc=$?
          set -e
          if [ "$rc" = "0" ]; then
            echo "::error::npm verify-cache failed to detect tampering"
            exit 1
          fi
          echo "✓ npm verify-cache detected tampering (rc=$rc)"

      # --- pnpm ---------------------------------------------------------
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: pnpm — populate store v3 via a real install
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/pnpm-smoke"
          cd "$RUNNER_TEMP/pnpm-smoke"
          # pnpm refuses to install without a package.json that has at
          # least name+version. `pnpm init` writes a minimal one.
          pnpm init >/dev/null
          pnpm add --silent is-odd@3.0.1
          test -f pnpm-lock.yaml
          # `pnpm store path` prints the directory containing the `v3` segment.
          store_root=$(pnpm store path | tr -d '\r')
          echo "PNPM_STORE_ROOT=$store_root" >>"$GITHUB_ENV"
          test -d "$store_root/files"
      - name: pnpm — verify-cache (action wrapper, clean)
        uses: ./verify-cache
        with:
          lockfile: ${{ runner.temp }}/pnpm-smoke/pnpm-lock.yaml
          # pnpm/action-setup can put the store in non-default
          # locations (depends on PNPM_HOME). Pass it through
          # explicitly so the verifier doesn't guess wrong.
          cache: ${{ env.PNPM_STORE_ROOT }}
      - name: pnpm — poison + assert verify-cache fails
        run: |
          set -euo pipefail
          # Pick a regular content blob (skip the *-index.json files —
          # tampering one of those would be detected too but it's a
          # different code path; we want the per-file integrity check).
          # `-print -quit` instead of `| head -1` avoids a SIGPIPE
          # race under `set -o pipefail`.
          blob=$(find "$PNPM_STORE_ROOT/files" -type f ! -name '*-index.json' -print -quit)
          test -n "$blob" || { echo "::error::no pnpm blob found to poison"; exit 1; }
          echo "poisoning $blob"
          printf 'X' >>"$blob"
          set +e
          "$SAKIMORI_BIN" deps verify-cache \
            --lockfile "$RUNNER_TEMP/pnpm-smoke/pnpm-lock.yaml" \
            --cache "$PNPM_STORE_ROOT"
          rc=$?
          set -e
          if [ "$rc" = "0" ]; then
            echo "::error::pnpm verify-cache failed to detect tampering"
            exit 1
          fi
          echo "✓ pnpm verify-cache detected tampering (rc=$rc)"

      # --- cargo --------------------------------------------------------
      - name: cargo — populate registry cache via fetch
        run: |
          # The earlier `cargo build` already populated $CARGO_HOME/registry/cache.
          # Confirm at least one .crate is present before we proceed.
          n=$(find "$HOME/.cargo/registry/cache" -name '*.crate' -type f | wc -l)
          echo "cargo cache has $n .crate files"
          test "$n" -gt 0
      - name: cargo — verify-cache (action wrapper, clean)
        uses: ./verify-cache
        with:
          lockfile: Cargo.lock
      - name: cargo — poison + assert verify-cache fails
        run: |
          set -euo pipefail
          # `find ... | head -1` would race SIGPIPE under `pipefail`.
          # `-print -quit` stops at the first match inside `find`.
          crate=$(find "$HOME/.cargo/registry/cache" -name '*.crate' -type f -print -quit)
          test -n "$crate" || { echo "::error::no .crate to poison"; exit 1; }
          echo "poisoning $crate"
          printf 'X' >>"$crate"
          set +e
          "$SAKIMORI_BIN" deps verify-cache --lockfile Cargo.lock
          rc=$?
          set -e
          if [ "$rc" = "0" ]; then
            echo "::error::cargo verify-cache failed to detect tampering"
            exit 1
          fi
          echo "✓ cargo verify-cache detected tampering (rc=$rc)"

  ebpf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install bpf-linker
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev libclang-19-dev
          cargo install bpf-linker --locked
      - name: Build eBPF object
        working-directory: crates/sakimori-ebpf
        env:
          # Override the repo-root rust-toolchain.toml (which pins stable).
          RUSTUP_TOOLCHAIN: nightly
        run: |
          cargo build --release --target bpfel-unknown-none -Z build-std=core
      - uses: actions/upload-artifact@v4
        with:
          name: sakimori-bpf
          path: crates/sakimori-ebpf/target/bpfel-unknown-none/release/sakimori

  smoke:
    needs: [userspace, ebpf]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Build the userspace binary natively on this runner's arch.
      - name: Build sakimori (${{ matrix.arch }})
        run: cargo build --release -p sakimori
      # eBPF object is arch-independent (bpfel-unknown-none) — reuse.
      - uses: actions/download-artifact@v4
        with:
          name: sakimori-bpf
          path: bpf
      - name: Inspect kernel / bpf capabilities
        run: |
          uname -a
          mount | grep cgroup || true
          ls -la /sys/fs/cgroup | head -20
      - name: Prepare binary
        run: |
          mkdir -p bin
          cp target/release/sakimori bin/sakimori
          chmod +x bin/sakimori
          ls -la bpf bin
      - name: policy dry-run
        run: |
          ./bin/sakimori check-policy -p examples/sakimori.yml
      - name: audit-mode e2e (captures exec/open/connect with mixed ALLOW+DENY)
        env:
          SAKIMORI_BPF_OBJ: ${{ github.workspace }}/bpf/sakimori
          RUST_LOG: info
        run: |
          # Policy is *audit* mode (nothing is actually blocked) but
          # includes explicit deny entries for each event class so the
          # uploaded HTML artifact shows the realistic "ALLOW + DENY"
          # mix a user would see in block mode. This gives reviewers
          # something useful to look at in the PR report artifact
          # instead of the previous all-ALLOW noise.
          cat > /tmp/audit.yml <<'EOF'
          mode: audit
          network:
            default: allow
            deny:
              - target: example.com      # resolved to 1+ IPs at startup
                ports: [443]
              - target: 1.1.1.1
                ports: [443]
          file:
            default: allow
            deny:
              - /etc/os-release          # the child below reads this
          process:
            deny_exec:
              - /usr/bin/whoami          # the child below runs this
          EOF
          # The child exercises every deny path so the report has
          # DENY-annotated exec, open, and connect rows:
          #   - whoami        → exec deny
          #   - cat os-release→ open deny
          #   - curl example  → connect deny
          #   - plain echo    → plain ALLOW exec, for contrast
          sudo -E ./bin/sakimori run \
            --policy /tmp/audit.yml \
            --log /tmp/sakimori.log.json \
            --html /tmp/sakimori-report.html \
            -- /bin/sh -c '
              echo hello from sakimori;
              /usr/bin/whoami >/dev/null 2>&1 || true;
              cat /etc/os-release >/dev/null 2>&1 || true;
              curl -s -o /dev/null -m 5 https://example.com || true;
              curl -s -o /dev/null -m 5 https://1.1.1.1 || true;
            ' \
            2> /tmp/sakimori.stderr
          echo "--- stderr ---"
          cat /tmp/sakimori.stderr
          if grep -q "running in passthrough" /tmp/sakimori.stderr; then
            echo "::error::eBPF attach failed; programs did not load"
            exit 1
          fi
          echo "--- audit log ---"
          cat /tmp/sakimori.log.json
          python3 - <<'PY'
          import json, sys
          log = json.load(open("/tmp/sakimori.log.json"))
          kinds = {}
          denied_kinds = {}
          for s in log.get("samples", []):
              kinds[s["kind"]] = kinds.get(s["kind"], 0) + 1
              if s.get("denied"):
                  denied_kinds[s["kind"]] = denied_kinds.get(s["kind"], 0) + 1
          print(f"observed={log['observed']} denied={log['denied']} lost={log['lost']}")
          print(f"sample kinds: {kinds}")
          print(f"denied-sample kinds: {denied_kinds}")
          # Every kind must be represented in the samples.
          missing = [k for k in ("exec", "open", "connect") if kinds.get(k, 0) == 0]
          if "exec" in missing:
              print(f"::error::no exec samples captured")
              sys.exit(1)
          if missing:
              print(f"::warning::no samples for: {missing}")
          # Report-artifact requirement: at least one DENY in each
          # of exec/open/connect so the uploaded HTML visibly shows
          # the mixed-verdict table.
          for kind in ("exec", "open", "connect"):
              if denied_kinds.get(kind, 0) == 0:
                  print(f"::warning::no DENY-tagged {kind} samples — report will look plain")
          PY
      - name: block-mode e2e (kernel actually denies egress)
        env:
          SAKIMORI_BPF_OBJ: ${{ github.workspace }}/bpf/sakimori
          RUST_LOG: info
        run: |
          cat > /tmp/block.yml <<'EOF'
          mode: block
          network: {}
          EOF
          set +e
          sudo -E ./bin/sakimori run \
            --policy /tmp/block.yml \
            --log /tmp/sakimori-block.log.json \
            -- /bin/sh -c '
              curl -sS -o /dev/null -m 5 http://93.184.216.34 2> /tmp/curl.stderr
              echo "curl_rc=$?" > /tmp/child.result
            '
          coro_rc=$?
          set -e
          echo "--- sakimori rc=${coro_rc} ---"
          cat /tmp/child.result
          cat /tmp/curl.stderr
          cat /tmp/sakimori-block.log.json
          python3 - <<'PY'
          import json, re, sys
          log = json.load(open("/tmp/sakimori-block.log.json"))
          if log['denied'] == 0:
              print("::error::block: no denied events recorded in JSON log")
              sys.exit(1)
          child = dict(line.split("=", 1) for line in open("/tmp/child.result") if "=" in line)
          curl_rc = int(child.get("curl_rc", "0").strip())
          if curl_rc == 0:
              print("::error::block: curl succeeded — kernel did NOT enforce deny")
              sys.exit(1)
          stderr = open("/tmp/curl.stderr").read()
          if not re.search(r"(connect|denied|permission)", stderr, re.I):
              print(f"::error::block: curl failed (rc={curl_rc}) but stderr doesn't look like a network block:\n{stderr}")
              sys.exit(1)
          bad = [
              s for s in log['samples']
              if s.get('kind') == 'connect'
              and s.get('denied') is True
              and s.get('daddr') == '93.184.216.34'
          ]
          if not bad:
              print(f"::error::no denied connect event for 93.184.216.34 in samples")
              print(json.dumps([s for s in log['samples'] if s['kind']=='connect'], indent=2))
              sys.exit(1)
          print(f"OK: {log['denied']} denied events, curl rc={curl_rc}, stderr confirms kernel-level block")
          PY
          if [ "$coro_rc" = "0" ]; then
            echo "::error::sakimori exit=0 despite denied>0"
            exit 1
          fi
      - name: file block e2e (kernel kills on denied open)
        env:
          SAKIMORI_BPF_OBJ: ${{ github.workspace }}/bpf/sakimori
          RUST_LOG: info
        run: |
          cat > /tmp/file-block.yml <<'EOF'
          mode: block
          network:
            default: allow
          file:
            default: allow
            deny:
              - /etc/shadow
          EOF
          set +e
          sudo -E ./bin/sakimori run \
            --policy /tmp/file-block.yml \
            --log /tmp/file-block.log.json \
            -- /bin/sh -c 'cat /etc/shadow 2>/tmp/cat.stderr; echo cat_rc=$? > /tmp/cat.result'
          coro_rc=$?
          set -e
          echo "--- sakimori rc=${coro_rc} ---"
          echo "--- cat result ---"
          cat /tmp/cat.result 2>/dev/null || echo "(no result file — process was killed before writing)"
          echo "--- cat stderr ---"
          cat /tmp/cat.stderr 2>/dev/null || true
          echo "--- log ---"
          head -40 /tmp/file-block.log.json
          # The /bin/sh child got SIGKILL'd on the denied open. Either:
          # (a) the result file is missing (killed mid-command), or
          # (b) cat_rc is 137/128+9 (SIGKILL).
          if [ -f /tmp/cat.result ]; then
            rc=$(grep -oE 'cat_rc=[0-9]+' /tmp/cat.result | cut -d= -f2)
            echo "cat_rc=$rc"
            # cat killed by SIGKILL → 137; sakimori also surfaces violation.
            if [ "$rc" = "0" ]; then
              echo "::error::cat succeeded reading /etc/shadow — kernel block didn't fire"
              exit 1
            fi
          fi
          if [ "$coro_rc" = "0" ]; then
            echo "::error::sakimori exit=0 despite denied open in block mode"
            exit 1
          fi
          # Cross-check: the JSON log should have at least one denied open.
          python3 - <<'PY'
          import json, sys
          log = json.load(open("/tmp/file-block.log.json"))
          hit = any(
              s.get("kind") == "open"
              and s.get("denied") is True
              and s.get("filename", "").startswith("/etc/shadow")
              for s in log["samples"]
          )
          if not hit:
              print("::error::no denied open event for /etc/shadow in the log")
              sys.exit(1)
          print(f"✓ denied={log['denied']} — kernel-side file block fired")
          PY
      - name: file-prefix audit (flags /etc/shadow reads as denied)
        env:
          SAKIMORI_BPF_OBJ: ${{ github.workspace }}/bpf/sakimori
          RUST_LOG: info
        run: |
          cat > /tmp/file.yml <<'EOF'
          mode: audit
          network:
            default: allow
          file:
            default: allow
            deny:
              - /etc/shadow
          EOF
          sudo -E ./bin/sakimori run \
            --policy /tmp/file.yml \
            --log /tmp/sakimori-file.log.json \
            -- /bin/sh -c 'cat /etc/shadow >/dev/null 2>&1 || true; cat /etc/hostname >/dev/null'
          python3 - <<'PY'
          import json, sys
          log = json.load(open("/tmp/sakimori-file.log.json"))
          shadow_denied = any(
              s.get("kind") == "open"
              and s.get("denied") is True
              and s.get("filename", "").startswith("/etc/shadow")
              for s in log["samples"]
          )
          print(f"denied={log['denied']} observed={log['observed']}")
          if not shadow_denied:
              print("::error::expected /etc/shadow open to be logged as denied")
              print(json.dumps(log['samples'][:5], indent=2))
              sys.exit(1)
          PY
      - name: block mode refuses passthrough when BPF attach fails
        env:
          RUST_LOG: info
        run: |
          cat > /tmp/block-strict.yml <<'EOF'
          mode: block
          network: {}
          EOF
          set +e
          sudo -E env SAKIMORI_BPF_OBJ=/does/not/exist \
            ./bin/sakimori run \
              --policy /tmp/block-strict.yml \
              --log /tmp/sakimori-strict.log.json \
              -- /bin/true 2> /tmp/strict.stderr
          rc=$?
          set -e
          cat /tmp/strict.stderr
          if [ "$rc" = "0" ]; then
            echo "::error::block mode silently passed through despite BPF attach failure"
            exit 1
          fi
          grep -q "::error title=sakimori::" /tmp/strict.stderr \
            || { echo "::error::missing GitHub Actions error annotation"; exit 1; }
          grep -q "refusing passthrough" /tmp/strict.stderr \
            || { echo "::error::missing refuse-passthrough explanation"; exit 1; }
          echo "✓ block mode correctly refused to run without BPF"
      - name: process.deny_exec audit (flags /usr/bin/whoami)
        env:
          SAKIMORI_BPF_OBJ: ${{ github.workspace }}/bpf/sakimori
          RUST_LOG: info
        run: |
          cat > /tmp/exec.yml <<'EOF'
          mode: audit
          network:
            default: allow
          file:
            default: allow
          process:
            deny_exec:
              - /usr/bin/whoami
          EOF
          sudo -E ./bin/sakimori run \
            --policy /tmp/exec.yml \
            --log /tmp/sakimori-exec.log.json \
            -- /bin/sh -c '/usr/bin/whoami >/dev/null'
          python3 - <<'PY'
          import json, sys
          log = json.load(open("/tmp/sakimori-exec.log.json"))
          hit = any(
              s.get("kind") == "exec"
              and s.get("denied") is True
              and (s.get("filename") == "/usr/bin/whoami" or s.get("argv0") == "/usr/bin/whoami")
              for s in log["samples"]
          )
          if not hit:
              print("::error::expected /usr/bin/whoami exec to be tagged denied")
              print(json.dumps([s for s in log['samples'] if s['kind'] == 'exec'], indent=2))
              sys.exit(1)
          PY
      - name: Upload audit logs + HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sakimori-report-${{ matrix.arch }}
          path: |
            /tmp/sakimori-report.html
            /tmp/sakimori.log.json
            /tmp/sakimori-block.log.json
            /tmp/sakimori-file.log.json
            /tmp/sakimori-exec.log.json

  job-scoped-smoke:
    # Proves `bokuweb/sakimori/job@v0` (the JS-action wrapper that
    # supervises every step of a job via a single daemon) actually
    # observes traffic from steps it didn't run itself.
    needs: [userspace, ebpf]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sakimori (host arch)
        run: cargo build --release -p sakimori
      - uses: actions/download-artifact@v4
        with:
          name: sakimori-bpf
          path: bpf
      - name: Prepare pre-installed binary
        run: |
          mkdir -p "$RUNNER_TEMP/sakimori-pre"
          cp target/release/sakimori "$RUNNER_TEMP/sakimori-pre/sakimori"
          cp bpf/sakimori "$RUNNER_TEMP/sakimori-pre/sakimori.bpf.o"
          chmod +x "$RUNNER_TEMP/sakimori-pre/sakimori"
          echo "SAKIMORI_BIN=$RUNNER_TEMP/sakimori-pre/sakimori" >> "$GITHUB_ENV"
          echo "SAKIMORI_BPF_OBJ=$RUNNER_TEMP/sakimori-pre/sakimori.bpf.o" >> "$GITHUB_ENV"
      - name: Write audit policy
        run: |
          # Audit only — the smoke is about cross-step *observation*,
          # not enforcement (that's already proved by the `smoke` job
          # above). One deny per kind so the report shows verdict mix.
          cat > "$RUNNER_TEMP/policy.yml" <<'EOF'
          mode: audit
          network:
            default: allow
            deny:
              - target: 1.1.1.1
                ports: [443]
          file:
            default: allow
            deny:
              - /etc/os-release
          process:
            deny_exec:
              - /usr/bin/whoami
          EOF

      # Start the daemon by hand instead of via `uses: bokuweb/sakimori/job`.
      # Two GitHub-Actions limitations make the wrapper unreachable from
      # CI on the same PR:
      #   1. Local refs (`uses: ./job`) silently skip pre/post hooks,
      #      so the daemon never starts and the assertion can't run.
      #   2. Step-level `uses:` doesn't accept `${{ }}` expressions,
      #      so we can't pin to ${github.sha} of the current PR either.
      # The full wrapper is exercised post-release via consumer-smoke.yml
      # against the published release; here we exercise the daemon's
      # cross-step observation mechanics, which is the actually-novel
      # piece. The wrapper's role is just to invoke this same CLI from
      # pre.js/post.js.
      - name: Start daemon (mimics pre.js)
        run: |
          set -euo pipefail
          # Background the daemon attached to *this* step's parent pid
          # (= Runner.Worker, the common ancestor of every step in the
          # job). Detached + stdio redirected so it survives the step.
          setsid sudo -n -E "$SAKIMORI_BIN" daemon start \
            --observe-cgroup-of "$PPID" \
            --policy "$RUNNER_TEMP/policy.yml" \
            --mode audit \
            --log "$RUNNER_TEMP/sakimori-job.log.json" \
            --html "$RUNNER_TEMP/sakimori-job.html" \
            --pid-file "$RUNNER_TEMP/sakimori-job.pid" \
            > "$RUNNER_TEMP/sakimori-daemon.stdout.log" \
            2> "$RUNNER_TEMP/sakimori-daemon.stderr.log" \
            < /dev/null &
          disown
          # Poll for ready (pid-file appears only after BPF attach
          # succeeds). 20s budget matches pre.js.
          deadline=$(( $(date +%s) + 20 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if [ -f "$RUNNER_TEMP/sakimori-job.pid" ]; then
              echo "daemon ready (pid $(cat "$RUNNER_TEMP/sakimori-job.pid")), observing cgroup of PPID=$PPID"
              exit 0
            fi
            sleep 0.2
          done
          echo "::error::daemon did not become ready in 20s"
          echo "--- daemon stderr ---"
          cat "$RUNNER_TEMP/sakimori-daemon.stderr.log" || true
          exit 1

      # Three separate steps the daemon must observe. If cross-step
      # cgroup inheritance is broken, only one will appear in the log.
      - name: Step A (whoami → exec deny)
        run: /usr/bin/whoami >/dev/null 2>&1 || true
      - name: Step B (cat os-release → open deny)
        run: cat /etc/os-release >/dev/null 2>&1 || true
      - name: Step C (curl 1.1.1.1 → connect deny)
        run: curl -s -o /dev/null -m 5 https://1.1.1.1 || true

      # post hook will fire here when this job ends, writing the JSON
      # log + HTML. The assertions below run BEFORE post, so we read
      # the log via an explicit `daemon stop` first — re-using the
      # daemon's own flush path is the only way to observe the file
      # within the same job (the daemon writes only on SIGTERM).
      - name: Force-flush the daemon and inspect log
        run: |
          set -euo pipefail
          sudo -n -E "$SAKIMORI_BIN" daemon stop \
            --pid-file "$RUNNER_TEMP/sakimori-job.pid"
          # Echo daemon stderr — surfaces ringbuf warnings, attach
          # errors, etc.
          if [ -s "$RUNNER_TEMP/sakimori-daemon.stderr.log" ]; then
            echo "--- daemon stderr ---"
            cat "$RUNNER_TEMP/sakimori-daemon.stderr.log"
          fi
          test -f "$RUNNER_TEMP/sakimori-job.log.json"
          python3 - <<'PY'
          import json, os, sys
          path = os.path.join(os.environ["RUNNER_TEMP"], "sakimori-job.log.json")
          # The explicit `daemon stop` above is the only flush in this
          # job — post.js's stop will no-op (pid-file already gone) —
          # so the log contains exactly one JSON document.
          log = json.load(open(path))
          print(f"observed={log['observed']} denied={log['denied']} samples={len(log['samples'])}")
          # Job-scoped observation must capture events from at least
          # two distinct steps. Without cross-step cgroup inheritance,
          # we'd see events from only the step where the daemon was
          # spawned (or nothing at all).
          kinds = {}
          for s in log["samples"]:
              kinds[s["kind"]] = kinds.get(s["kind"], 0) + 1
          print(f"kinds: {kinds}")
          missing = [k for k in ("exec", "open", "connect") if kinds.get(k, 0) == 0]
          if missing:
              print(f"::error::job-scoped daemon missed events of kind(s): {missing}")
              sys.exit(1)
          # The whole point: at least one exec sample whose filename
          # is /usr/bin/whoami (proves Step A's process was observed,
          # which only happens if the daemon's cgroup attach caught
          # a process forked by the runner *after* pre.js).
          if not any(
              s["kind"] == "exec"
              and (s.get("filename") == "/usr/bin/whoami" or s.get("argv0") == "/usr/bin/whoami")
              for s in log["samples"]
          ):
              print("::error::no /usr/bin/whoami exec sample — cross-step observation failed")
              print(json.dumps([s for s in log['samples'] if s['kind'] == 'exec'], indent=2))
              sys.exit(1)
          print("✓ cross-step observation confirmed: events from steps A/B/C are all in the log")
          PY
      - name: Upload job-scoped audit log + html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sakimori-job-report
          path: |
            ${{ runner.temp }}/sakimori-job.log.json
            ${{ runner.temp }}/sakimori-job.html
            ${{ runner.temp }}/sakimori-daemon.stdout.log
            ${{ runner.temp }}/sakimori-daemon.stderr.log

  advisories-smoke:
    # Cross-OS end-to-end for `sakimori advisories scan` + the proxy's
    # install logger. Two things we want to prove on every supported
    # host OS:
    #
    #   1. The install-log file format (`InstallEvent` JSONL) is
    #      readable on the OS — path-handling, line-ending, encoding,
    #      `$HOME` defaulting all behave.
    #   2. A scan against real OSV.dev with a known-malicious entry
    #      flags it, exits non-zero, and surfaces the GHSA ID. The
    #      negative control (a benign entry) does NOT appear.
    #
    # We don't run the proxy here — that's covered by `proxy-smoke`
    # and `proxy-action-smoke`. Instead we hand-write an installs.jsonl
    # so the test stays hermetic against package-manager UA drift.
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sakimori
        run: cargo build --release -p sakimori
      - name: Resolve sakimori binary path
        run: |
          set -euxo pipefail
          case "$RUNNER_OS" in
            Windows) bin="$GITHUB_WORKSPACE/target/release/sakimori.exe" ;;
            *)       bin="$GITHUB_WORKSPACE/target/release/sakimori" ;;
          esac
          test -x "$bin"
          echo "SAKIMORI_BIN=$bin" >> "$GITHUB_ENV"

      - name: Run unit tests for new modules
        # Quick belt-and-braces — the workspace `cargo test` in
        # `userspace` only runs on Linux. We want the platform-neutral
        # crates exercised on macOS / Windows too, especially the
        # filesystem append path in `installs`.
        run: |
          cargo test -p sakimori-core installs::
          cargo test -p sakimori-core advisories::

      - name: Hand-craft an installs.jsonl with one known-malicious entry
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/sakimori"
          # event-stream@3.3.6 is the canonical reference malicious
          # npm release (GHSA-mh6f-8j2x-4483 / OSV) — published 2018,
          # still indexed, and very stable across OSV refreshes.
          # Paired with a benign entry to prove the negative side.
          python3 - <<PY > "$RUNNER_TEMP/sakimori/installs.jsonl"
          import json
          rows = [
              {"ecosystem":"npm","name":"event-stream","version":"3.3.6",
               "resolved_at":"2026-01-01T00:00:00Z","execution_mode":"persistent",
               "user_agent":"npm/10.0.0 node/20.0.0"},
              {"ecosystem":"npm","name":"left-pad","version":"1.3.0",
               "resolved_at":"2026-01-02T00:00:00Z","execution_mode":"persistent",
               "user_agent":"npm/10.0.0 node/20.0.0"},
          ]
          for r in rows:
              print(json.dumps(r))
          PY
          cat "$RUNNER_TEMP/sakimori/installs.jsonl"

      - name: scan — known-malicious flagged, exits non-zero, JSON shape correct
        run: |
          set -euo pipefail
          set +e
          "$SAKIMORI_BIN" advisories scan \
            --install-log "$RUNNER_TEMP/sakimori/installs.jsonl" \
            --json > "$RUNNER_TEMP/scan.json"
          rc=$?
          set -e
          echo "exit_code=$rc"
          cat "$RUNNER_TEMP/scan.json"
          if [ "$rc" = "0" ]; then
            echo "::error::advisories scan exited 0 despite a known-malicious entry"
            exit 1
          fi
          python3 - <<'PY'
          import json, os, sys
          report = json.load(open(os.path.join(os.environ["RUNNER_TEMP"], "scan.json")))
          assert report["installs_scanned"] == 2, report
          assert report["unique_packages"] == 2, report
          hits = report["hits"]
          assert len(hits) >= 1, hits
          es = [h for h in hits if h["name"] == "event-stream" and h["version"] == "3.3.6"]
          assert es, f"expected event-stream@3.3.6 in hits: {hits}"
          assert es[0]["ecosystem"] == "npm"
          assert es[0]["execution_mode"] == "persistent"
          assert any(i.startswith("GHSA-") or i.startswith("MAL-") for i in es[0]["advisory_ids"]), es[0]
          # Negative control: left-pad@1.3.0 has no advisories (it's
          # famous for breaking the internet, not for malware).
          assert not any(h["name"] == "left-pad" for h in hits), hits
          print(f"ok: {len(hits)} hit(s), event-stream advisories: {es[0]['advisory_ids']}")
          PY

      - name: scan — empty log is a clean success
        run: |
          set -euxo pipefail
          : > "$RUNNER_TEMP/sakimori/empty.jsonl"
          "$SAKIMORI_BIN" advisories scan \
            --install-log "$RUNNER_TEMP/sakimori/empty.jsonl" \
            --json > "$RUNNER_TEMP/scan-empty.json"
          python3 - <<'PY'
          import json, os
          r = json.load(open(os.path.join(os.environ["RUNNER_TEMP"], "scan-empty.json")))
          assert r["installs_scanned"] == 0, r
          assert r["unique_packages"] == 0, r
          assert r["hits"] == [], r
          print("ok empty")
          PY

      - name: scan — missing log file is a clean success (treated as empty)
        run: |
          set -euxo pipefail
          "$SAKIMORI_BIN" advisories scan \
            --install-log "$RUNNER_TEMP/sakimori/nope.jsonl" \
            --json > "$RUNNER_TEMP/scan-missing.json"
          python3 - <<'PY'
          import json, os
          r = json.load(open(os.path.join(os.environ["RUNNER_TEMP"], "scan-missing.json")))
          assert r["installs_scanned"] == 0, r
          assert r["hits"] == [], r
          print("ok missing")
          PY

      - name: proxy start accepts --no-install-log / --install-log flags
        # Surface-level CLI test — we don't actually run the proxy
        # here (proxy-smoke does that). Just prove the flags parse on
        # every OS so a typo can't slip in on a platform we don't
        # otherwise exercise.
        run: |
          set -euxo pipefail
          "$SAKIMORI_BIN" proxy start --help > "$RUNNER_TEMP/proxy-help.txt"
          grep -q -- "--no-install-log" "$RUNNER_TEMP/proxy-help.txt"
          grep -q -- "--install-log" "$RUNNER_TEMP/proxy-help.txt"
          echo "ok: install-log flags exposed on $RUNNER_OS"

      - name: Upload scan outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advisories-${{ matrix.runner }}
          path: |
            ${{ runner.temp }}/sakimori/installs.jsonl
            ${{ runner.temp }}/scan.json
            ${{ runner.temp }}/scan-empty.json
            ${{ runner.temp }}/scan-missing.json

  proxy-action-smoke:
    # Verifies that `bokuweb/sakimori/proxy@v0` (the JS-action wrapper
    # that spawns `sakimori proxy start` and exports HTTPS_PROXY via
    # $GITHUB_ENV) actually works on all three supported OSes. The
    # existing `proxy-smoke` job tests the proxy *binary* directly;
    # this one tests the action wiring.
    #
    # Builds sakimori locally on each matrix entry and pre-sets
    # SAKIMORI_BIN so the action skips its `gh release download` and
    # exercises the binary built from THIS PR's code. Without that
    # escape hatch we'd be testing whatever the published `@v0`
    # binary happens to be — which currently lacks Windows proxy
    # support, and even after release.yml learns to cross-build for
    # Windows the action wouldn't be testable here until after the
    # next tag goes out (chicken-and-egg).
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build sakimori (main binary; cross-OS via cfg-gated eBPF deps)
        run: cargo build --release -p sakimori

      - name: Prepare SAKIMORI_BIN env
        run: |
          set -euxo pipefail
          case "$RUNNER_OS" in
            Windows) bin="$GITHUB_WORKSPACE/target/release/sakimori.exe" ;;
            *)       bin="$GITHUB_WORKSPACE/target/release/sakimori" ;;
          esac
          test -x "$bin"
          echo "SAKIMORI_BIN=$bin" >> "$GITHUB_ENV"

      # Pick an uncommon port to avoid colliding with anything the
      # runner image might be listening on.
      - uses: ./proxy
        with:
          min-age: 7d
          listen: 127.0.0.1:18910

      - name: Verify env vars are exported to subsequent steps
        run: |
          set -euxo pipefail
          test -n "$HTTPS_PROXY"
          test -n "$NODE_EXTRA_CA_CERTS"
          test -f "$NODE_EXTRA_CA_CERTS"
          echo "HTTPS_PROXY=$HTTPS_PROXY"
          echo "CA=$NODE_EXTRA_CA_CERTS"

      - name: Verify the proxy is reachable (TCP probe)
        run: |
          set -euxo pipefail
          # Cross-OS TCP-port probe. The action's main job is to
          # spawn the proxy + export env; this confirms the spawn
          # actually produced a listening server that survives into
          # this later step.
          node -e "
          const net = require('net');
          const s = net.createConnection({ host: '127.0.0.1', port: 18910 }, () => {
            console.log('proxy port open');
            s.destroy();
          });
          s.on('error', e => { console.error('proxy port closed:', e.message); process.exit(1); });
          "

      # Rewriter end-to-end verification runs on Linux only — the
      # existing `proxy-smoke` job covers it more thoroughly than we
      # can here. On Windows the Git-Bash curl uses the schannel
      # TLS backend, which ignores `--cacert` and doesn't trust our
      # self-signed MITM CA without an explicit certutil install
      # into the system store. That's out of scope: trusting the CA
      # on Windows runners is the consumer's responsibility (e.g.
      # via `bokuweb/sakimori proxy install-ca`), not the action's.
      - name: Verify rewriter pruned recent serde versions (Linux only)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          # Direct fetch — bypass our own env exports so we don't
          # measure through the proxy by accident.
          direct=$(env -u HTTPS_PROXY -u HTTP_PROXY -u https_proxy -u http_proxy \
                   curl -fsS https://index.crates.io/se/rd/serde | wc -l | tr -d ' ')
          via=$(curl -fsS --cacert "$NODE_EXTRA_CA_CERTS" -x "$HTTPS_PROXY" \
                  https://index.crates.io/se/rd/serde | wc -l | tr -d ' ')
          echo "serde versions: direct=$direct via=$via"
          if [ "$via" -gt "$direct" ]; then
            echo "::error::proxy returned MORE versions than direct fetch ($via > $direct) — rewriter broken"
            exit 1
          fi
          if [ "$via" -lt 50 ]; then
            echo "::error::proxy kept implausibly few versions ($via) — rewriter likely returned empty body"
            exit 1
          fi
          echo "✓ proxy is filtering crates.io responses on $RUNNER_OS"
