name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the release + upload assets

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build userspace binary
        run: cargo build --release -p sakimori --target ${{ matrix.target }}

      # eBPF object (arch-independent ELF but rebuilt per runner for reproducibility)
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install bpf-linker
        run: |
          sudo apt-get install -y llvm-19-dev libclang-19-dev
          cargo install bpf-linker --locked
      - name: Build eBPF object
        working-directory: crates/sakimori-ebpf
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: cargo build --release --target bpfel-unknown-none -Z build-std=core

      - name: Package tarball
        run: |
          set -euo pipefail
          name="sakimori-${{ matrix.target }}"
          staging="staging/${name}"
          mkdir -p "${staging}"
          cp target/${{ matrix.target }}/release/sakimori "${staging}/sakimori"
          cp crates/sakimori-ebpf/target/bpfel-unknown-none/release/sakimori "${staging}/sakimori.bpf.o"
          cp README.md LICENSE-MIT LICENSE-APACHE "${staging}/" 2>/dev/null || true
          tar -czf "${name}.tar.gz" -C staging "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            sakimori-${{ matrix.target }}.tar.gz
            sakimori-${{ matrix.target }}.tar.gz.sha256

  build-macos:
    # Build both Apple Silicon and Intel targets on a single macos-14
    # (aarch64) runner — the Intel matrix spot (`macos-13`) is under
    # increasing runner pressure at GitHub and was queueing for >30min.
    # Apple Silicon hosts cross-compile both directions with just
    # `rustup target add x86_64-apple-darwin`.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Build both macOS targets
        run: |
          set -euo pipefail
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            echo "=== ${target} ==="
            cargo build --release -p sakimori --target "${target}"
          done
      - name: Package tarballs
        run: |
          set -euo pipefail
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            name="sakimori-${target}"
            staging="staging/${name}"
            mkdir -p "${staging}"
            cp "target/${target}/release/sakimori" "${staging}/sakimori"
            cp README.md "${staging}/" 2>/dev/null || true
            cp packaging/macos/dev.sakimori.watch.plist "${staging}/" 2>/dev/null || true
            cp packaging/macos/README.md "${staging}/macos-README.md" 2>/dev/null || true
            tar -czf "${name}.tar.gz" -C staging "${name}"
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            sakimori-*-apple-darwin.tar.gz
            sakimori-*-apple-darwin.tar.gz.sha256

  build-windows:
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sakimori-win
        working-directory: crates/sakimori-win
        run: cargo build --release

      - name: Package tarball
        shell: pwsh
        run: |
          $name = "sakimori-$env:TARGET"
          $staging = "staging\$name"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "crates\sakimori-win\target\release\sakimori-win.exe" "$staging\sakimori-win.exe"
          Copy-Item README.md "$staging\" -ErrorAction SilentlyContinue
          tar -czf "$name.tar.gz" -C staging $name
          $hash = (Get-FileHash "$name.tar.gz" -Algorithm SHA256).Hash.ToLower()
          # Match `sha256sum` format so the same verify line works cross-arch.
          "$hash  $name.tar.gz" | Out-File -Encoding ascii "$name.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: release-x86_64-pc-windows-msvc
          path: |
            sakimori-x86_64-pc-windows-msvc.tar.gz
            sakimori-x86_64-pc-windows-msvc.tar.gz.sha256

  publish:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes="Release ${TAG}. Assets: Linux (sakimori + sakimori.bpf.o) and Windows (sakimori-win.exe) per target."
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "${notes}" \
            dist/*.tar.gz dist/*.sha256

  moving-tag:
    needs: publish
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, '-')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update v<MAJOR> tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          major=$(echo "${TAG}" | sed -E 's/^v([0-9]+).*/v\1/')
          echo "Updating moving tag ${major} -> ${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${major}"
          git push origin "${major}" --force
